<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOMBAY SPECIAL LIVE CHART</title>
    <style>
        :root { --gold: #ffcc00; --cyan: #00ffff; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: Arial, sans-serif; text-align: center; margin: 0; padding: 0; }
        .header { background: #111; padding: 15px; border-bottom: 2px solid var(--gold); }
        .week-row { display: flex; width: 98%; margin: 8px auto; border: 1px solid #444; background: #111; min-height: 85px; }
        .date-box { width: 45px; background: var(--cyan); color: #000; font-size: 11px; font-weight: bold; display: flex; align-items: center; justify-content: center; writing-mode: vertical-lr; transform: rotate(180deg); }
        .grid { display: flex; flex: 1; background: #000; gap: 2px; padding: 2px; }
        .cell { flex: 1; border: 1px solid #333; background: #1a1a1a; display: flex; align-items: center; justify-content: space-between; padding: 3px; }
        .panna { display: flex; flex-direction: column; font-size: 9px; color: #aaa; font-weight: bold; line-height: 1.1; }
        .jodi { flex: 1; font-size: 20px; font-weight: bold; text-align: center; }
        .lock { background: #0a0a0a; color: var(--gold); display: flex; align-items: center; justify-content: center; font-size: 24px; flex: 1; border: 1px dashed #444; }
        .red { color: #ff3333; }
        .card { background: #111; border: 1px solid var(--gold); margin: 20px; padding: 20px; border-radius: 12px; }
        .btn { padding: 12px 25px; background: var(--gold); border: none; font-weight: bold; cursor: pointer; border-radius: 5px; color: #000; text-transform: uppercase; }
        .qr-img { width: 250px; border: 3px solid #fff; margin: 15px 0; border-radius: 10px; }
    </style>
</head>
<body>

<div class="header"><h1>BOMBAY SPECIAL CHART</h1></div>

<div id="chartArea">चार्ट लोड हो रहा है...</div>

<div class="card">
    <h2 style="color:var(--gold)">🔒 VIP FULL CHART</h2>
    <p>VIP जोड़ी के लिए अभी अनलॉक करें</p>
    <button class="btn" onclick="document.getElementById('pay').style.display='block'">UNLOCK NOW</button>
</div>

<div id="pay" style="display:none;" class="card">
    <img src="phonpe-qr.jpeg.jpeg" class="qr-img">
    <h3>Omkar Yadav</h3>
    <p>UPI ID: omkaryadavsonu8888-1@oksbi</p>
    <button class="btn" style="background:#25D366; color:#fff;" onclick="window.open('https://wa.me/918103982813')">WhatsApp Par Sampark Karein</button>
</div>

<script>
    // आपकी Google Sheet ID यहाँ डाल दी गई है
    const SHEET_ID = '1IReRyQjRvWWVjZTym_8DDXvx9Jttjfgy18McY53gM5w'; 
    const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

    async function fetchChart() {
        try {
            const response = await fetch(SHEET_URL);
            const text = await response.text();
            const data = JSON.parse(text.substr(47).slice(0, -2));
            const rows = data.table.rows;
            let html = '';

            rows.forEach((row, index) => {
                if(index === 0) return; // Heading Row skip
                
                let range = row.c[0] ? row.c[0].v : 'Date';
                html += `<div class="week-row"><div class="date-box">${range}</div><div class="grid">`;
                
                let lockOn = false;
                for(let i=1; i<19; i+=3) {
                    let l = row.c[i] ? row.c[i].v : '';
                    let j = row.c[i+1] ? row.c[i+1].v : '';
                    let r = row.c[i+2] ? row.c[i+2].v : '';

                    if(l && j && r) {
                        let isRed = (i == 4 || i == 16); 
                        let p1 = String(l).padStart(3, '0');
                        let p2 = String(r).padStart(3, '0');
                        html += `<div class="cell">
                            <div class="panna"><span>${p1[0]}</span><span>${p1[1]}</span><span>${p1[2]}</span></div>
                            <div class="jodi ${isRed ? 'red' : ''}">${j}</div>
                            <div class="panna"><span>${p2[0]}</span><span>${p2[1]}</span><span>${p2[2]}</span></div>
                        </div>`;
                    } else if(!lockOn) {
                        html += `<div class="lock">🔒</div>`;
                        lockOn = true;
                    } else {
                        html += `<div class="cell" style="background:#050505"></div>`;
                    }
                }
                html += `</div></div>`;
            });
            document.getElementById('chartArea').innerHTML = html;
        } catch(e) {
            document.getElementById('chartArea').innerHTML = "<p style='color:red;'>Sheet settings में 'Anyone with the link' करें और Row 1 में हेडिंग डालें।</p>";
        }
    }
    fetchChart();
</script>
</body>
</html>
